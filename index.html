<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Coral Reef Center</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>Coral Reef Center</h1></header>
    <nav>
        <button onclick="showPage('equipment-page')">المعدات</button>
        <button onclick="showPage('customers-page')">العملاء</button>
        <button onclick="showPage('rentals-page')">التأجير</button>
        <button onclick="showPage('return-page')">إرجاع</button>
        <button onclick="showPage('stats-page')">التقارير</button>
    </nav>
    <main>
        <section id="equipment-page" class="page-section">
            <h2>إضافة معدة</h2>
            <form id="equipment-form">
                <input type="text" id="eq-serial" placeholder="السيريال نمبر" required>
                <input type="text" id="eq-company" placeholder="الشركة المصنعة" required>
                <input type="text" id="eq-type" placeholder="نوع المعدة" required>
                <input type="number" id="eq-price" placeholder="سعر التأجير اليومي" required>
                <button type="submit">حفظ</button>
            </form>
        </section>
        <!-- بقية الصفحات بنفس الترتيب السابق -->
    </main>
    <script src="app.js"></script>
</body>
</html>
